<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RGB Login Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f0f0f;
}

/* RGB Glow Border */
.container {
  position: relative;
  width: 350px;
  padding: 40px;
  border-radius: 15px;
  background: #1a1a1a;
  overflow: hidden;
}

.container::before {
  content: '';
  position: absolute;
  inset: -2px;
  background: linear-gradient(45deg, red, blue, lime, yellow, cyan, magenta, red);
  animation: animate 6s linear infinite;
  z-index: -1;
}

.container::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: #1a1a1a;
  border-radius: 15px;
  z-index: -1;
}

@keyframes animate {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 20px;
}

.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid #555;
  outline: none;
  color: #fff;
  border-radius: 5px;
}

.input-box label {
  position: absolute;
  left: 10px;
  top: 10px;
  color: #aaa;
  font-size: 14px;
  transition: 0.3s;
}

.input-box input:focus ~ label,
.input-box input:valid ~ label {
  top: -10px;
  font-size: 12px;
  color: cyan;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: cyan;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

.toggle {
  margin-top: 15px;
  text-align: center;
  color: #aaa;
  cursor: pointer;
}

.toggle span {
  color: cyan;
}

.hidden {
  display: none;
}
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  overflow: hidden;
}

/* RGB Gradient Background */
body::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    45deg,
    red,
    blue,
    lime,
    cyan,
    magenta,
    yellow,
    red
  );
  animation: rgbMove 10s linear infinite;
  z-index: -2;
  filter: blur(100px);
}

/* Dark overlay for contrast */
body::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: -1;
  filter: blur(150px);
}


@keyframes rgbMove {
  0% {
    transform: translate(-25%, -25%) rotate(0deg);
  }
  100% {
    transform: translate(-25%, -25%) rotate(360deg);
  }
}
</style>

</head>

<body>
    <!-- har -->
     <div class="login-container">
    <form class="login-form">
        <h2>Login</h2>
        <p>Please enter your details to sign in.</p>
        
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
        
        <p class="signup-link">Don't have an account? <a href="#">Create one</a></p>
    </form>
</div>

<div class="container">
  
  <!-- Login Form -->
  <form id="loginForm">
    <h2>Login</h2>

    <div class="input-box">
      <input type="text" required>
      <label>Username</label>
    </div>

    <div class="input-box">
      <input type="password" required>
      <label>Password</label>
    </div>

    <button type="submit">Login</button>

    <div class="toggle" onclick="toggleForm()">
      Don't have an account? <span>Register</span>
    </div>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="hidden">
    <h2>Register</h2>

    <div class="input-box">
      <input type="text" required>
      <label>Username</label>
    </div>

    <div class="input-box">
      <input type="email" required>
      <label>Email</label>
    </div>

    <div class="input-box">
      <input type="password" required>
      <label>Password</label>
    </div>

    <button type="submit">Register</button>

    <div class="toggle" onclick="toggleForm()">
      Already have an account? <span>Login</span>
    </div>
  </form>

</div>

<script>
function toggleForm() {
  document.getElementById("loginForm").classList.toggle("hidden");
  document.getElementById("registerForm").classList.toggle("hidden");
}
</script>

</body>
</html>
